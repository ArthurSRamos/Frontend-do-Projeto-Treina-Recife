<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAREFAS</title>
</head>
<body>
    <header> <nav style="background-color: aqua;">
            <ul>
                <li><a href="dashboard.html">DASHBOARD</a></li>
                <li><a href="tarefas.html">TAREFAS</a></li>
                <li><a href="projetos.html">PROJETOS</a></li>
                <li><a href="usuarios.html">USUARIOS</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <H2>Formulario de Tarefas</H2>
    <hr>
        <form>
            <label for="nome">Username</label><br>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="pwd">Password</label><br>
            <input type="password" id="pwd" name="pwd"><br><br>
    <hr>
            <textarea name="descricao" id="descricao" style="width: 60px; height: 100px;"> 
                
            </textarea><br><br>

            <label for="html">HTML</label>           
            <input type="radio" id="html" name="lang"><br><br>

            <label for="css">CSS</label>
            <input type="radio" id="css" name="lang"><br><br>

            <label for="js">JS</label>
            <input type="radio" id="js" name="lang"><br><br>
            <hr>

            <h3>Escolha seu(s) jogador(es) preferido(s)</h3>

              <label for="messi">MESSI</label>
            <input type="checkbox" id="messi" name="messi"><br><br>

              <label for="cr7">CRISTIANO RONALDO</label> 
            <input type="checkbox" id="cr7" name="cr7"> <br><br>

              <label for="neymar">NEYMAR</label>
            <input type="checkbox" id="neymar" name="neymar"> <br><br>
            <hr>

            <label for="datahoje">Data Hoje</label>
            <input type="date" id="datahoje" name="datahoje">

            <hr>
            <label for="selecoes">Escolha sua seleção</label><br><br>

            <select name="selecoes" id="selecoes"> 
                <option >Brasil</option>
                <option> França</option>
                <option >Alemanha</option>
                <option >Portugal</option>

            </select>
            <hr>
            <button type="submit" id="btn" name="btn">Enviar</button><br>
          
        </form>
    </main>
    
</body>
</html>
