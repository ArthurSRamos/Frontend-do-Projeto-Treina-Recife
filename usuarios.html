        <main>
                <H2>PÁGINA DE USUARIOS</H2>

            <form >
                <label for="nomeUsuario">Nome:*</label>
                <input type="text"name="nomeUsuario" id="nomeUsuario" placeholder="Digite o nome"><br><br>


                <label for="cpfUsuario">CPF:*</label>
                <input type="number"name=cpfUsuario id="cpfUsuario"><br><br>

                <label for="emailUsuario">Email:*</label>
                <input type="email"name=emailUsuario id="emailUsuario"><br><br>

                <label for="dtNascimento">Data de Nascimento:*</label>
                <input type="date" name="dtNascimento" id="dtNascimento"><br><br>

                <label for="stUsuario">Status:*</label>
                <select name="stUsuario" id="stUsuario">
                    <option >Selecione o status</option>
                    <option >Ativo</option>
                    <option >Inativo</option>
                    <option >Pendente</option>
                </select><br><br>

                <label for="st">Senha Temporária:*</label>
                <input type="password" name="st" id="st" placeholder="Digite a senha"><br><br>

                <button type="submit">Adicionar Usuário</button><br><br>
                <button type="button">Cancelar</button>



        </form>
        </main>
</body>
