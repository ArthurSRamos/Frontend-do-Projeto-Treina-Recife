<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJETOS</title>
</head>
<body>
       <nav style="background-color: aqua;">
            <ul>
                <li><a href="dashboard.html">DASHBOARD</a></li>
                <li><a href="tarefas.html">TAREFAS</a></li>
                <li><a href="projetos.html">PROJETOS</a></li>
                <li><a href="usuarios.html">USUARIOS</a></li>
            </ul>
        </nav>
        <main>
            <form>

                <label for="nomeProjeto">Nome do Projeto:*</label>
                <input type="text" name="nomeProjeto" id="nomeProjeto"><br><br>
        

                <label for="dcprojeto">Descrição:</label>
                <textarea name="dcprojeto" id="dcprojeto" placeholder="Descreva o projeto" ></textarea><br><br>

                <label for="dtcriacao">Data de Criação:*</label>
                <input type="date" name="dtcriacao" id="dtcriacao"><br><br>
                
                <label for="dtconclusao">Data de Conclusão:*</label>
                <input type="date" name="dtconclusao" id="dtconclusao"><br><br>

                <label>Status:*</label>
                <select name="status" id="status">
                    <option>Selecione</option>
                    <option>Pendente </option>
                    <option>Endamento</option>
                    <option>Concluido</option>
                    <option>Entregue</option>
                </select><br><br>

                <label for="responsavel">Responsável:*</label>
                <input type="text" name="responsavel" id="responsavel" placeholder="Nome do Responsável"><br><br>

                <button type="submit">Salvar</button><br><br>
                <button type="button">Cancelar</button>


                





            </form>
        </main>

    <h2>PÁGINA DE PROJETOS</h2>
</body>
</html>
